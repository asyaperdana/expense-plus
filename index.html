<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e8d71" />
    <meta name="description" content="Aplikasi manajemen keuangan pribadi untuk melacak pengeluaran dan mengelola budget" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Expense Tracker" />
    <link rel="manifest" href="/expense-plus/manifest.json" />
    <link rel="apple-touch-icon" href="/expense-plus/icon-192x192.png" />
    <title>Expense Tracker</title>
    <script type="module" crossorigin src="/expense-plus/assets/index-aT7g7sOS.js"></script>
    <link rel="stylesheet" crossorigin href="/expense-plus/assets/index-chJ96yMD.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
